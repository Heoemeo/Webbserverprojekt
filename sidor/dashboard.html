<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dashboard - Habito</title>
        <link rel="stylesheet" href="styles/navbar.css" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
    </head>
    <body>
        <nav>
            <section class="nav-container">
                <h1>Habito</h1>
                <button class="hamburger" onclick="toggleMenu()">
                    <svg
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg"
                    >
                        <line
                            x1="4"
                            y1="6"
                            x2="20"
                            y2="6"
                            stroke="#1A1A1A"
                            stroke-width="2"
                            stroke-linecap="round"
                        />
                        <line
                            x1="4"
                            y1="12"
                            x2="20"
                            y2="12"
                            stroke="#1A1A1A"
                            stroke-width="2"
                            stroke-linecap="round"
                        />
                        <line
                            x1="4"
                            y1="18"
                            x2="20"
                            y2="18"
                            stroke="#1A1A1A"
                            stroke-width="2"
                            stroke-linecap="round"
                        />
                    </svg>
                </button>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="habits.html">Habits</a>
                    <a href="profile.html">Profile</a>
                    <a href="about.html">About</a>
                    <a href="contact.html">Contact</a>
                    <a href="dashboard.html">Dashboard</a>
                </div>
            </section>
        </nav>

        <main class="container py-5">
            <h2 class="mb-4">Protected Dashboard</h2>
            <p>This page is only visible for logged in users.</p>

            <div class="card p-4">
                <h4>User Info</h4>
                <p><strong>ID:</strong> <span id="user-id">Loading...</span></p>
                <p>
                    <strong>Username:</strong>
                    <span id="user-name">Loading...</span>
                </p>
                <p>
                    <strong>Email:</strong>
                    <span id="user-email">Loading...</span>
                </p>

                <div class="mt-3 d-flex gap-2">
                    <a href="habits.html" class="btn btn-success"
                        >Go to Habits</a
                    >
                    <button id="logout-btn" class="btn btn-danger">
                        Log out
                    </button>
                </div>
            </div>
        </main>
        <script>
            function toggleMenu() {
                document.querySelector('.nav-links').classList.toggle('active')
            }
        </script>
        <script src="scripts/dashboard.js"></script>
    </body>
</html>
