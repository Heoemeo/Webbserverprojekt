<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Habits</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />

    <!-- Din egen CSS -->
    <link rel="stylesheet" href="/styles/habits.css" />
    <link rel="stylesheet" href="/styles/navbar.css" />
</head>
<body>
    <!-- NAVBAR -->
    <!-- Här ligger Habito-loggan och länkarna -->
    <nav>
        <section class="nav-container">
            <h1>
                <a href="index.html" style="text-decoration: none; color: inherit;">
                   Habito
               </a>
           </h1>
            <div>
                <a href="index.html">Home</a>
                <a href="habits.html">Habits</a>
                <a href="profile.html">Profile</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </div>
        </section>
    </nav>

    <!-- Huvudinnehåll -->
    <!-- container här istället för på body, så navbar/footer kan behålla sin fulla bredd -->
    <main class="container py-4">
        <!-- Toppsektion med rubrik + logout-knapp -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Your Habits</h2>

            <div class="d-flex gap-2">
        <!-- Login -->
        <button id="login-btn" class="btn btn-outline-primary">
            Login
        </button>

        <!-- Logout -->
        <button id="logout-btn" class="btn btn-outline-danger">
            Log out
        </button>
    </div>
        </div>

        <!-- Formulär för att skapa habit -->
        <form id="habit-form" class="mb-4">
            <!-- Titel -->
            <div class="mb-2">
                <input
                    id="title"
                    class="form-control"
                    type="text"
                    placeholder="Habit title"
                    required
                />
            </div>

            <!-- Beskrivning -->
            <div class="mb-2">
                <input
                    id="description"
                    class="form-control"
                    type="text"
                    placeholder="Description"
                />
            </div>

            <!-- Kategorier -->
            <div class="mb-3">
                <label class="form-label">Categories</label>

                <div class="dropdown">
                    <button
                        class="btn btn-outline-secondary dropdown-toggle w-100 text-start"
                        type="button"
                        id="categoryDropdownButton"
                        data-bs-toggle="dropdown"
                        data-bs-auto-close="outside"
                        aria-expanded="false"
                    >
                        Choose categories
                    </button>

                    <!-- Här fyller JS in checkboxar -->
                    <div
                        class="dropdown-menu w-100 p-3"
                        id="categories-container"
                    ></div>
                </div>
            </div>

            <!-- Frequency -->
            <div class="mb-3">
                <label for="frequency" class="form-label">Frequency</label>
                <select id="frequency" class="form-select">
                    <option value="">Choose frequency</option>
                </select>
            </div>

            <!-- Skapa habit -->
            <button class="btn btn-success" type="submit">
                Create Habit
            </button>
        </form>

        <!-- Ej startade habits -->
        <h2 class="mt-4">Active Habits</h2>
        <div id="habit-list"></div>

        <!-- Progress-sektion -->
        <h2 class="mt-5">My Progress</h2>
        <div id="log-list"></div>
    </main>

    <!-- FOOTER -->
    <footer>
        <div>
            <h4>Contact</h4>
            <a href="contact.html">Email Us</a>
            <a href="#">Facebook</a>
            <a href="#">Twitter</a>
        </div>
        <div>
            <h4>Habito</h4>
            <a href="index.html">Home</a>
            <a href="habits.html">Habits</a>
            <a href="profile.html">Profile</a>
        </div>
        <div>
            <h4>About</h4>
            <a href="about.html">Our Story</a>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Din JS -->
    <script src="/scripts/habits.js"></script>
</body>
</html>
