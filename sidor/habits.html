<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Habits</title>

        <!-- Bootstrap -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />

        <!-- Din CSS -->
        <link rel="stylesheet" href="styles/navbar.css" />
        <link rel="stylesheet" href="styles/habits.css" />
        <link rel="stylesheet" href="styles/responsive.css" />
    </head>
    <body>
        <!-- NAVBAR -->
        <nav>
            <section class="nav-container">
                <h1>Habito</h1>
                <button class="hamburger" onclick="toggleMenu()">
                    <svg
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg"
                    >
                        <line
                            x1="4"
                            y1="6"
                            x2="20"
                            y2="6"
                            stroke="#1A1A1A"
                            stroke-width="2"
                            stroke-linecap="round"
                        />
                        <line
                            x1="4"
                            y1="12"
                            x2="20"
                            y2="12"
                            stroke="#1A1A1A"
                            stroke-width="2"
                            stroke-linecap="round"
                        />
                        <line
                            x1="4"
                            y1="18"
                            x2="20"
                            y2="18"
                            stroke="#1A1A1A"
                            stroke-width="2"
                            stroke-linecap="round"
                        />
                    </svg>
                </button>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="habits.html">Habits</a>
                    <a href="profile.html">Profile</a>
                    <a href="about.html">About</a>
                    <a href="contact.html">Contact</a>
                    <a href="dashboard.html">Dashboard</a>
                </div>
            </section>
        </nav>

        <!-- Huvudinnehåll -->
        <main class="container py-4">
            <!-- Rubrik + login/logout -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0">Your Habits</h2>

                <div class="d-flex gap-2">
                    <button
                        id="login-btn"
                        type="button"
                        class="btn btn-outline-primary"
                    >
                        Login
                    </button>

                    <button
                        id="logout-btn"
                        type="button"
                        class="btn btn-outline-danger"
                        style="display: none"
                    >
                        Log out
                    </button>
                </div>
            </div>

            <!-- Formulär för att skapa habit -->
            <form id="habit-form" class="mb-4">
                <div class="mb-2">
                    <input
                        id="title"
                        class="form-control"
                        type="text"
                        placeholder="Habit title"
                        required
                    />
                </div>

                <div class="mb-2">
                    <input
                        id="description"
                        class="form-control"
                        type="text"
                        placeholder="Description"
                    />
                </div>

                <div class="mb-3">
                    <label class="form-label">Categories</label>

                    <div class="dropdown">
                        <button
                            class="btn btn-outline-secondary dropdown-toggle w-100 text-start"
                            type="button"
                            id="categoryDropdownButton"
                            data-bs-toggle="dropdown"
                            data-bs-auto-close="outside"
                            aria-expanded="false"
                        >
                            Choose categories
                        </button>

                        <div
                            class="dropdown-menu w-100 p-3"
                            id="categories-container"
                        ></div>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="frequency" class="form-label">Frequency</label>
                    <select id="frequency" class="form-select">
                        <option value="">Choose frequency</option>
                    </select>
                </div>

                <button class="btn btn-success" type="submit">
                    Create Habit
                </button>
            </form>

            <h2 class="mt-4">Active Habits</h2>
            <div id="habit-list"></div>

            <h2 class="mt-5">My Progress</h2>
            <div id="log-list"></div>
        </main>

        <!-- FOOTER -->
        <footer>
            <div class="footer-section">
                <button class="footer-toggle" onclick="toggleFooter(this)">
                    Contact <span>▼</span>
                </button>
                <div class="footer-links">
                    <a href="#">Email Us</a>
                    <a href="#">Facebook</a>
                    <a href="#">Twitter</a>
                </div>
            </div>
            <div class="footer-section">
                <button class="footer-toggle" onclick="toggleFooter(this)">
                    Habito <span>▼</span>
                </button>
                <div class="footer-links">
                    <a href="index.html">Home</a>
                    <a href="habits.html">Habits</a>
                    <a href="profile.html">Profile</a>
                </div>
            </div>
            <div class="footer-section">
                <button class="footer-toggle" onclick="toggleFooter(this)">
                    About <span>▼</span>
                </button>
                <div class="footer-links">
                    <a href="#">Our Story</a>
                    <a href="#">Team</a>
                    <a href="#">Careers</a>
                </div>
            </div>
        </footer>
        <script>
            function toggleMenu() {
                document.querySelector('.nav-links').classList.toggle('active')
            }
        </script>

        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

        <!-- Din JS -->
        <script src="scripts/habits.js"></script>
    </body>
</html>
